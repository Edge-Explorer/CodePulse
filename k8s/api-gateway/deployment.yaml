apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: codepulse-api:latest
        imagePullPolicy: AfterChecks  # Or 'Never' if testing locally
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: codepulse-secrets
              key: DATABASE_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"